<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Atmospheric Effect -->
<div class="absolute inset-0 ai-glow z-0 pointer-events-none"></div>
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] z-0"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px] z-0"></div>
<!-- Main Content Shell -->
<main class="w-full max-w-[440px] px-margin-mobile z-10">
<!-- Branding Header -->
<header class="flex flex-col items-center mb-stack-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center mb-stack-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary-container text-[28px]" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight font-bold mb-stack-sm">
                PortfolioPro AI
            </h1>
<p class="font-body-base text-body-base text-on-surface-variant text-center px-4">
                Create your account
            </p>
</header>
<!-- Auth Card -->
<section class="glass-card rounded-[24px] p-8 shadow-2xl animate-in fade-in slide-in-from-bottom-8 duration-1000">
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 bg-white text-surface px-6 py-3.5 rounded-xl font-medium transition-all duration-200 hover:bg-gray-100 active:scale-[0.98] mb-stack-lg">
<svg height="20" viewbox="0 0 24 24" width="20">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 6.31l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-base">Sign up with Google</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-4 mb-stack-lg">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="font-label-caps text-label-caps text-outline uppercase">or email</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>
</div>
<!-- Form -->
<form action="#" class="space-y-6" onsubmit="return false">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block ml-1 uppercase" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container border border-outline-variant rounded-xl pl-12 pr-4 py-3 text-body-base text-on-surface placeholder:text-outline/50 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="email" placeholder="alex@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block ml-1 uppercase" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container border border-outline-variant rounded-xl pl-12 pr-12 py-3 text-body-base text-on-surface placeholder:text-outline/50 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="password" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<p class="font-body-sm text-[12px] text-outline ml-1">Must be at least 8 characters long.</p>
</div>
<button class="w-full bg-primary-container text-on-primary-container py-4 rounded-xl font-bold font-body-base transition-all duration-300 hover:shadow-[0_0_20px_rgba(79,70,229,0.4)] active:scale-[0.97] relative overflow-hidden group" type="submit">
<span class="relative z-10">Create account</span>
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
</button>
</form>
<div class="mt-8 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-semibold hover:underline decoration-primary/30 transition-all" href="#">Login</a>
</p>
</div>
</section>
<!-- Footer Policy -->
<footer class="mt-8 text-center">
<p class="font-body-sm text-[12px] text-outline px-8 leading-relaxed">
                By signing up, you agree to our <a class="hover:text-primary underline" href="#">Terms of Service</a> and <a class="hover:text-primary underline" href="#">Privacy Policy</a>.
            </p>
</footer>
</main>
<!-- Aesthetic Decorative Elements -->
<div class="absolute top-1/4 right-1/4 w-px h-[200px] bg-gradient-to-b from-transparent via-primary/20 to-transparent hidden md:block"></div>
<div class="absolute bottom-1/4 left-1/4 w-px h-[200px] bg-gradient-to-b from-transparent via-secondary/20 to-transparent hidden md:block"></div>
<script>
        // Micro-interactions
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
                input.parentElement.parentElement.classList.add('transition-transform');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Add shimmer animation style
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shimmer {
                0% { transform: translateX(-100%); }
                100% { transform: translateX(100%); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body></html>
